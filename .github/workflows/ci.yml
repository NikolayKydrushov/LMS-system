name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests (or check configuration)
      env:
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DEBUG: 'True'
        ALLOWED_HOSTS: 'localhost'
        NAME: 'test_db'
        USER: 'test_user'
        PASSWORD: 'test_pass'
        HOST: 'localhost'
        PORT: '5432'
        REDIS_HOST: 'localhost'
        REDIS_PORT: '6379'
        REDIS_DB: '0'
      run: |
        # Проверяем, есть ли тесты
        if [ -d "tests" ] || [ -d "*/tests" ]; then
          python manage.py test
        else
          echo "No tests found, running system check instead..."
          python manage.py check
        fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/LMS-system || exit 1
          
          # Сохраняем текущий .env
          if [ -f .env ]; then
            cp .env .env.backup
          fi
          
          # Обновляем код из репозитория (используем ту же ветку, что запушили)
          git pull origin ${{ github.ref_name }}
          
          # Восстанавливаем .env из бэкапа
          if [ -f .env.backup ]; then
            cp .env.backup .env
            echo ".env restored from backup"
          else
            cp .env.sample .env
            echo "WARNING: .env file was created from .env.sample"
            echo "Please edit .env manually with real passwords!"
          fi
          
          # Создаем директории для данных
          mkdir -p data/postgres data/redis
          
          # Останавливаем старые контейнеры
          docker-compose down
          
          # Пересобираем и запускаем новые
          docker-compose up -d --build
          
          # Очищаем старые образы
          docker image prune -f
          
          # Проверяем статус
          echo "Deployment completed. Container status:"
          docker-compose ps
