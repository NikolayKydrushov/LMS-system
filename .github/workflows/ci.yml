name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      env:
        SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
        DEBUG: 'True'
        ALLOWED_HOSTS: 'localhost'
        NAME: 'test_db'
        USER: 'test_user'
        PASSWORD: 'test_pass'
        HOST: 'localhost'
        PORT: '5432'
        REDIS_HOST: 'localhost'
        REDIS_PORT: '6379'
        REDIS_DB: '0'
      run: |
        python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/LMS-system
          
          # Сохраняем текущий .env (с паролями)
          if [ -f .env ]; then
            cp .env .env.backup
          fi
          
          # Обновляем код из репозитория
          git pull origin main
          
          # Восстанавливаем .env из бэкапа
          if [ -f .env.backup ]; then
            cp .env.backup .env
            echo ".env restored from backup"
          else
            # Если нет бэкапа, копируем из .env.sample и выводим предупреждение
            cp .env.sample .env
            echo "WARNING: .env file was created from .env.sample"
            echo "Please edit .env manually with real passwords!"
            echo "Run: nano ~/LMS-system/.env"
          fi
          
          # Создаем директории для данных (если их нет)
          mkdir -p data/postgres data/redis
          
          # Останавливаем старые контейнеры
          docker-compose down
          
          # Пересобираем и запускаем новые
          docker-compose up -d --build
          
          # Очищаем старые образы
          docker image prune -f
          
          # Проверяем статус
          echo "Deployment completed. Container status:"
          docker-compose ps

