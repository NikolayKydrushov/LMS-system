version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: lms_db
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${NAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # Только локальный доступ
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - lms_network

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Только локальный доступ
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - lms_network

  web:
    build: .
    container_name: lms_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    expose:
      - "8000"  # Только для внутренней сети
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms_network

  celery-worker:
    build: .
    container_name: lms_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db
    networks:
      - lms_network

  celery-beat:
    build: .
    container_name: lms_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db
    networks:
      - lms_network

  nginx:
    image: nginx:1.25-alpine
    container_name: lms_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/static
      - ./media:/media
    ports:
      - "80:80"
      - "443:443"  # для HTTPS, если будет
    depends_on:
      - web
    networks:
      - lms_network

networks:
  lms_network:
    driver: bridge
